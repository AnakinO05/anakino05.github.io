<!DOCTYPE html>
<html>
<scrollhide> <!-- This family just disables scrolling and hides the scrollbar, as well as auto-scrolling to the top if needed. -->
	<style>
		body {
			overflow: hidden;
			min-height: 100%;
		}
	</style>
	<script type="text/javascript">
		$(document).ready(function () {
			window.scrollTo(0,0);
		});
	</script>
</scrollhide>

	<style>
		.taskbars {
