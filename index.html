    <style>
		/* global stuff */
		/* these top two lines disable scrolling and hides the scrollbar */
		/* as well as auto-scrolling to the top if needed so it look pretty */
        body {
            overflow: hidden;
            min-height: 100%;
            background-color: #008080;
            margin: 0;
        }
		img {
			user-select: none;
			-webkit-user-select: none;
            image-rendering: pixelated;
		}

		/* cursor stuff */
		html, body, * {
			cursor: url("cur/98_2x.png"), default;
		}
		#aboutme, .wingroup {
			cursor: url("cur/98_2x.png"), move;
		}
		map[name="contact"] area {
			cursor: url("cur/98pointer_2x.png"), pointer;
		}
		/* taskbar stuff */
        .taskbars {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            z-index: 3;
        }
        .taskbarl {
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 4;
            height: 56px;
        }
        .taskbarr {
            position: absolute;
            bottom: 0;
            right: 0;
            height: 56px;
            z-index: 12;
        }

        /* desktop stuff */
        .deskico {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            height: 874px;
        }

        /* window stuff */
        .windowall {
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
            text-align: center;
			flex-direction: row;
			gap: 20px;
            min-height: 100vh;
            z-index: 2;
        }

        .wingroup {
            position: absolute;
            touch-action: none;
        }
    </style>
</head>

<script type="text/javascript">
	// Uh sir I believe there's a little bit of html/css in your javascript

	// if i changed the extension from .html to .js and changed nothing else this would

    // more disable scrolling stuff
	window.scrollTo(0, 0);
	
	const titleBar = {

	const windows = ["contact", "projects", "certs", "aboutme", "systemprop"];
	
	const taskbarButton = {
		"aboutme": { el: "taskbarl_aboutme", default: "background/taskbarl_aboutme1.png", 
		pressed: "background/taskbarl_aboutme2.png", active: "background/taskbarl_aboutme3.png" },

		"projects": { el: "taskbarl_projects", default: "background/taskbarl_projects1.png", 
		pressed: "background/taskbarl_projects2.png", active: "background/taskbarl_projects3.png" },
		"contact": { el: "taskbarl_contact", default: "background/taskbarl_contact1.png", 
		pressed: "background/taskbarl_contact2.png", active: "background/taskbarl_contact3.png" },
		"systemprop": { el: "taskbarl_systemprop", 
		default: "background/taskbarl_systemprop1.png", 
		pressed: "background/taskbarl_systemprop2.png", 
		active: "background/taskbarl_systemprop3.png",
		advDefault: "background/taskbarl_systempropADV1.png",
		advPressed: "background/taskbarl_systempropADV2.png",
		advActive:  "background/taskbarl_systempropADV3.png" },
	};
	
	const winButton = {
		"helpbutton": { parent: "aboutme", x: 600, y: 12, w: 32, h: 28,
		default: "window/helpbutton.png", pressed: "window/helpbutton_press.png" },
		"closebutton": { parent: "systemprop", x: 624, y: 12, w: 32, h: 28,
		default: "window/closebutton.png", pressed: "window/closebutton_press.png" }
	};
	
	const clockEl = document.getElementById("taskbarl_clock");
	const clockImgs = {};
	const clockIds = ["clockHour1","clockHour2","clockColon","clockMin1","clockMin2","clockAMPM"];
	clockIds.forEach(id => {
		const img = document.createElement("img");
		img.id = "clock_" + id;
		img.draggable = false;
		img.style.position = "fixed";
		img.style.zIndex = "13";
		img.style.pointerEvents = "none";
		img.style.imageRendering = "pixelated";
		img.style.visibility = "hidden";
		document.body.appendChild(img);
	});

	function clockImg(id) { return document.getElementById("clock_" + id); }

	function pinClock() {
		const bar = document.querySelector(".taskbarr");
		const rect = bar.getBoundingClientRect();
		const matrix = new DOMMatrix(getComputedStyle(bar).transform);
		const scale = matrix.a || 1;

		const now = new Date();
		let hours = now.getHours();
		const minutes = now.getMinutes();
		const ampm = hours >= 12 ? "PM" : "AM";
		hours = hours % 12 || 12;
		const twoDigit = hours >= 10;

		const coords = twoDigit ? {
			clockHour1:   { x: 98,  y: 22, w: 10, h: 18 },
			clockHour2:   { x: 110, y: 22, w: 10, h: 18 },
			clockColon:  { x: 120, y: 22, w: 8,  h: 18 },
			clockMin1:   { x: 128, y: 22, w: 10, h: 18 },
			clockMin2:   { x: 140, y: 22, w: 10, h: 18 },
			clockAMPM: { x: 156, y: 22, w: 30, h: 18 },
		} : {
			clockHour1:   { x: 104, y: 22, w: 10, h: 18 },
			clockHour2:   null,
			clockColon:  { x: 114, y: 22, w: 8,  h: 18 },
			clockMin1:   { x: 122, y: 22, w: 10, h: 18 },
			clockMin2:   { x: 134, y: 22, w: 10, h: 18 },
			clockAMPM: { x: 150, y: 22, w: 30, h: 18 },
		};

		const hStr = hours.toString().padStart(2, '0');
		const mStr = minutes.toString().padStart(2, '0');

		const vals = {
			clockHour1:   twoDigit ? `background/clock/${hStr[0]}.png` : `background/clock/${hStr[1]}.png`,
			clockHour2:   twoDigit ? `background/clock/${hStr[1]}.png` : null,
			clockColon:  "background/clock/colon.png",
			clockMin1:   `background/clock/${mStr[0]}.png`,
			clockMin2:   `background/clock/${mStr[1]}.png`,
			clockAMPM: `background/clock/${ampm}.png`,
		};

		clockIds.forEach(id => {
			const img = clockImg(id);
			const coord = coords[id];
			if (!coord) { img.style.display = "none"; return; }
			img.src = vals[id];
			img.style.display = "block";
			img.style.left   = (rect.right - rect.width + coord.x * scale) + "px";
			img.style.top    = (rect.top   + coord.y * scale) + "px";
			img.style.width  = (coord.w * scale) + "px";
			img.style.height = (coord.h * scale) + "px";
		});
	}

	try {
		const test = new Date();
		if (isNaN(test.getTime())) throw new Error();
		const blankBar = document.querySelector(".taskbarr");
		const preload = new Image();
		preload.onload = () => {
			blankBar.src = "background/taskbarr_blank.png";
			// wait one frame for the src swap to paint
			requestAnimationFrame(() => {
				pinClock();
				setInterval(pinClock, 1000);
			});
		};
		preload.src = "background/taskbarr_blank.png";
		window.addEventListener("resize", pinClock);
	} catch(e) {
		clockIds.forEach(id => { clockImg(id).style.display = "none"; });
	}
	
	if (typeof pinClock === 'function') pinClock();
	
	let dragWin = null;
	let offset = { x: 0, y: 0 };
	let topZ = 1000;
	let advDiscovered = false;
	let heldWinButton = null;

	function initWindowPositions() {
		const small = window.innerWidth < 1500 || window.innerHeight < 950;
		const large = window.innerWidth >= 3000 && window.innerHeight >= 1900;
		const scale = large ? 2 : small ? 0.5 : 1;

		const positions = {
			aboutme: { left: 323, top: 160 },
			certs: { left: 401, top: 454 },
			projects: { left: 979, top: 76 },
			contact: { left: 979, top: 594 },
			systemprop: { left: 20,  top: 20  },
		};

		Object.entries(positions).forEach(([id, pos]) => {
			const el = document.getElementById(id);
			el.style.position = "fixed";
			el.style.margin = "0";
			el.style.left = (pos.left * scale) + "px";
			el.style.top = (pos.top  * scale) + "px";
		});

		setTimeout(pinButton, 0);
	}

	initWindowPositions();

	// focused window stuff and taskbar button assoc.
	function focus(focusedWin) {
		Object.entries(taskbarButton).forEach(([id, btn]) => {
			const buttonStuff = document.getElementById(btn.el);
			if (!buttonStuff) return;
			if (id === "systemprop" && advDiscovered) return;
			buttonStuff.src = (focusedWin && focusedWin.id === id)
				? btn.active
				: btn.default;
		});
		Object.entries(titleBar).forEach(([btnId, data]) => {
				const btn = document.getElementById(btnId);
				if (!btn) return;
				btn.src = (focusedWin && focusedWin.id === data.parent)
					? data.active
					: data.inactive;
			});
			if (advDiscovered) {
				const btn = taskbarButton["systemprop"];
				const spBtn = document.getElementById("taskbarl_systemprop");
				const focused = focusedWin && focusedWin.id === "systemprop";
				const visible = document.getElementById("systemprop").style.display !== "none";
				const win = document.getElementById("systemprop");
				const isAdv = win.src.includes("systemprop3.png") || win.src.includes("systemprop2.png");
				if (isAdv) {
					document.getElementById("titlebar_systemprop").src = focused
						? "window/titlebar_systemprop2.png"
						: "window/titlebar_systemprop2_inactive.png";
					spBtn.src = (focused && visible) ? btn.advActive : btn.advDefault;
				} else {
					document.getElementById("titlebar_systemprop").src = focused
						? titleBar["titlebar_systemprop"].active
						: titleBar["titlebar_systemprop"].inactive;
					spBtn.src = (focused && visible) ? btn.active : btn.default;
				}
			}
		}
	function nextFocus() {
		let highestZ = -1;
		let highestWin = null;
		document.querySelectorAll(".wingroup").forEach(w => {
			if (!windows.includes(w.id)) return;
			if (w.style.display === "none") return;
			const z = parseInt(w.style.zIndex) || 0;
			if (z > highestZ) {
				highestZ = z;
				highestWin = w;
			}
		});
		focus(highestWin);
	}

	// taskbar button behavior
	// i hate my fucking life if you couldnt tell already
	Object.entries(taskbarButton).forEach(([id, btn]) => {
		const buttonStuff = document.getElementById(btn.el);
		if (!buttonStuff) return;

		buttonStuff.addEventListener("mousedown", () => {
			if (id === "systemprop" && advDiscovered) {
				const win = document.getElementById("systemprop");
				if (win.src.includes("systemprop2.png") || win.src.includes("systemprop3.png")) {
					if (buttonStuff.src.includes(btn.advDefault.split("/").pop())) {
						heldWinButton = "taskbar_" + id;
						buttonStuff.src = btn.advPressed;
					}
				}
				return;
			}
			if (buttonStuff.src.includes(btn.default.split("/").pop())) {
				heldWinButton = "taskbar_" + id;
				buttonStuff.src = btn.pressed;
			}
		});

		buttonStuff.addEventListener("mouseleave", () => {
			if (heldWinButton !== "taskbar_" + id) return;
			if (id === "systemprop" && advDiscovered) {
				buttonStuff.src = btn.advDefault;
				return;
			}
			buttonStuff.src = btn.default;
		});

		buttonStuff.addEventListener("mouseenter", () => {
			if (heldWinButton !== "taskbar_" + id) return;
			if (id === "systemprop" && advDiscovered) {
				buttonStuff.src = btn.advPressed;
				return;
			}
			buttonStuff.src = btn.pressed;
		});

		buttonStuff.addEventListener("mouseup", () => {
			if (heldWinButton !== "taskbar_" + id) return;
			heldWinButton = null;
		});

		buttonStuff.addEventListener("click", () => {
			const win = document.getElementById(id);
			const isAdv = id === "systemprop" && advDiscovered &&
				(document.getElementById("systemprop").src.includes("systemprop2.png") ||
				 document.getElementById("systemprop").src.includes("systemprop3.png"));
			const isActive = isAdv
				? buttonStuff.src.includes(btn.advActive.split("/").pop())
				: buttonStuff.src.includes(btn.active.split("/").pop());
			if (isActive) {
				win.style.display = "none";
				buttonStuff.src = isAdv ? btn.advDefault : btn.default;
				pinButton();
				advPinAll();
				nextFocus();
			} else {
				win.style.display = "block";
				win.style.zIndex = topZ += 10;
				focus(win);
				pinButton();
				advPinAll();
			}
		});
	});
	
	// rare edge case but whatever
	document.getElementById("contact").style.zIndex   = 10;
	document.getElementById("projects").style.zIndex  = 20;
	document.getElementById("certs").style.zIndex     = 30;
	document.getElementById("aboutme").style.zIndex   = 40;
	document.getElementById("systemprop").style.zIndex = 50;
	topZ = 50;
	document.addEventListener("selectionchange", () => {
		window.getSelection().removeAllRanges();
	});
	
	// on init, only About Me active + fix buttons asap
	focus(document.getElementById("aboutme"));
	setTimeout(pinButton, 0);

	// make buttons instead of changing entire window because it is harder but easier
	function pinButton() {
		Object.entries(titleBar).forEach(([btnId, data]) => {
			const parent = document.getElementById(data.parent);
			const btn = document.getElementById(btnId);
			if (parent.style.display === "none") {
				btn.style.display = "none";
				return;
			}
			const rect = parent.getBoundingClientRect();
			const scaleX = rect.width / parent.offsetWidth;
			const scaleY = rect.height / parent.offsetHeight;
			const parentZ = parseInt(parent.style.zIndex) || parseInt(getComputedStyle(parent).zIndex) || 0;
			btn.style.display = "block";
			btn.style.left   = (rect.left + data.x * scaleX) + "px";
			btn.style.top    = (rect.top  + data.y * scaleY) + "px";
			btn.style.width  = (data.w * scaleX) + "px";
			btn.style.height = (data.h * scaleY) + "px";
			btn.style.zIndex = parentZ + 1;
		});
		Object.entries(winButton).forEach(([btnId, data]) => {
			const parent = document.getElementById(data.parent);
			const btn = document.getElementById(btnId);
			if (parent.style.display === "none") {
				btn.style.display = "none";
				return;
			}
			const rect = parent.getBoundingClientRect();
			const scaleX = rect.width / parent.offsetWidth;
			const scaleY = rect.height / parent.offsetHeight;
			const parentZ = parseInt(parent.style.zIndex) || parseInt(getComputedStyle(parent).zIndex) || 0;
			btn.style.display = "block";
			btn.style.left   = (rect.left + data.x * scaleX) + "px";
			btn.style.top    = (rect.top  + data.y * scaleY) + "px";
			btn.style.width  = (data.w * scaleX) + "px";
			btn.style.height = (data.h * scaleY) + "px";
			btn.style.zIndex = parentZ + 2;
		});
	}
	window.addEventListener("resize", pinButton);

	document.getElementById("help").addEventListener("click", (e) => {
		e.preventDefault();
		const win = document.getElementById("systemprop");
		win.style.display = "block";
		win.style.zIndex = topZ += 10;
		focus(win);
		document.getElementById("taskbarl_systemprop").style.display = "block";
		pinButton();
	});

	// button image switch for about me/sysprop yippee
	document.getElementById("help").addEventListener("mousedown", () => {
		heldWinButton = "helpbutton";
		document.getElementById("helpbutton").src = winButton["helpbutton"].pressed;
	});
	document.getElementById("help").addEventListener("mouseleave", () => {
		if (heldWinButton === "helpbutton")
			document.getElementById("helpbutton").src = winButton["helpbutton"].default;
	});

	function advSetCounter(flagsLeft) {

	function advTileHighlight(r, c) {

		}
		return advHoldTile.r === r && advHoldTile.c === c;
	}
	
	function advTileStuff(r, c, forceReveal) {
		const cell = advBoard[r][c];
		if (forceReveal) {
			if (cell.state === 'flag' && !cell.mine) return "window/advanced/tile_incorrectflag.png";
			if (cell.mine && cell.state !== 'flag' && cell.state !== 'clicked') return "window/advanced/tile_mine.png";
		}
		switch (cell.state) {
			case 'flag':   return "window/advanced/tile_flag.png";
			case 'unsure': return advTileHighlight(r, c)
				? "window/advanced/tile_unsureclick.png"
				: "window/advanced/tile_unsure.png";
			case 'clicked':
				if (cell.mine) return "window/advanced/tile_mineclicked.png";
				return cell.adjCount > 0 ? `window/advanced/tile_${cell.adjCount}.png` : "window/advanced/tile_clicked.png";
			default: return advTileHighlight(r, c)
				? "window/advanced/tile_clicked.png"
				: "window/advanced/tile_unclicked.png";
		}
	}

	function advSeedMines(safeR, safeC) {
		const safe = new Set();
		for (let dr = -1; dr <= 1; dr++)
			for (let dc = -1; dc <= 1; dc++) {
				const nr = safeR + dr, nc = safeC + dc;
				if (nr >= 0 && nr < advRows && nc >= 0 && nc < advColumns)
					safe.add(nr * advColumns + nc);
			}
		let placed = 0;
		while (placed < advMines) {
			const r = Math.floor(Math.random() * advRows);
			const c = Math.floor(Math.random() * advColumns);
			if (!advBoard[r][c].mine && !safe.has(r * advColumns + c)) {
				advBoard[r][c].mine = true;
				placed++;
			}
		}
		for (let r = 0; r < advRows; r++)
			for (let c = 0; c < advColumns; c++) {
				if (advBoard[r][c].mine) continue;
				let count = 0;
				for (let dr = -1; dr <= 1; dr++)
					for (let dc = -1; dc <= 1; dc++) {
						const nr = r+dr, nc = c+dc;
						if (nr >= 0 && nr < advRows && nc >= 0 && nc < advColumns && advBoard[nr][nc].mine) count++;
					}
				advBoard[r][c].adjCount = count;
			}
	}

	function advReveal(r, c) {
		const cell = advBoard[r][c];
		if (cell.state !== 'unclicked' && cell.state !== 'unsure') return;
		cell.state = 'clicked';
		if (cell.adjCount === 0 && !cell.mine) {
			for (let dr = -1; dr <= 1; dr++)
				for (let dc = -1; dc <= 1; dc++) {
					const nr = r+dr, nc = c+dc;
					if (nr >= 0 && nr < advRows && nc >= 0 && nc < advColumns)
						advReveal(nr, nc);
				}
		}
	}

	function advWinCheck() {
		for (let r = 0; r < advRows; r++)
			for (let c = 0; c < advColumns; c++) {
				const cell = advBoard[r][c];
				if (!cell.mine && cell.state !== 'clicked') return false;
			}
		return true;
	}

	function advHandleLClick(r, c) {
		if (advLose || advWin) return;
		const cell = advBoard[r][c];
		if (cell.state === 'flag') return;

		if (!advStart) {
			advSeedMines(r, c);
			advStart = true;
			advTimerInterval = setInterval(() => {
				if (advTime < 999) { advTime++; advSetTimer(advTime); }
			}, 1000);
		}

		if (cell.mine) {
			cell.state = 'clicked';
			advLose = true;
			clearInterval(advTimerInterval); advTimerInterval = null;
			document.getElementById("ms_face").src = "window/advanced/face_die.png";
			advTileRender(true);
			advPinAll();
			return;
		}

		advReveal(r, c);

		if (advWinCheck()) {
			advWin = true;
			clearInterval(advTimerInterval); advTimerInterval = null;
			document.getElementById("ms_face").src = "window/advanced/face_cool.png";
			// flag remaining mines after win
			for (let rr = 0; rr < advRows; rr++)
				for (let cc = 0; cc < advColumns; cc++)
					if (advBoard[rr][cc].mine) advBoard[rr][cc].state = 'flag';
			advSetCounter(0);
		}

		advTileRender(false);
		advPinAll();
	}

	function advHandleRClick(r, c) {
		if (advLose || advWin || !advStart) return;
		const cell = advBoard[r][c];
		if (cell.state === 'clicked') return;
		if (cell.state === 'unclicked') cell.state = 'flag';
		else if (cell.state === 'flag')   cell.state = 'unsure';
		else if (cell.state === 'unsure') cell.state = 'unclicked';
		advSetCounter(advMines - advFlagsPlaced());
		advTileRender(false);
		advPinAll();
	}

	function advHandleMClick(r, c) {
		if (advLose || advWin || !advStart) return;
		const cell = advBoard[r][c];
		if (cell.state !== 'clicked' || cell.adjCount === 0) return;

		let flagCount = 0;
		for (let dr = -1; dr <= 1; dr++)
			for (let dc = -1; dc <= 1; dc++) {
				const nr = r+dr, nc = c+dc;
				if (nr >= 0 && nr < advRows && nc >= 0 && nc < advColumns)
					if (advBoard[nr][nc].state === 'flag') flagCount++;
			}
		if (flagCount !== cell.adjCount) return;
		for (let dr = -1; dr <= 1; dr++)
			for (let dc = -1; dc <= 1; dc++) {
				const nr = r+dr, nc = c+dc;
				if (nr < 0 || nr >= advRows || nc < 0 || nc >= advColumns) continue;
				const neighbor = advBoard[nr][nc];
				if (neighbor.state === 'flag' || neighbor.state === 'clicked') continue;
				if (neighbor.mine) {
					neighbor.state = 'clicked';
					advLose = true;
					clearInterval(advTimerInterval); advTimerInterval = null;
					document.getElementById("ms_face").src = "window/advanced/face_die.png";
					advTileRender(true);
					advPinAll();
					return;
				}
				advReveal(nr, nc);
			}

		if (!advLose && advWinCheck()) {
			advWin = true;
			clearInterval(advTimerInterval); advTimerInterval = null;
			document.getElementById("ms_face").src = "window/advanced/face_cool.png";
			for (let rr = 0; rr < advRows; rr++)
				for (let cc = 0; cc < advColumns; cc++)
					if (advBoard[rr][cc].mine) advBoard[rr][cc].state = 'flag';
			advSetCounter(0);
		}

		advTileRender(advLose);
		advPinAll();
	}
	
	function advPinAll() {
		const win = document.getElementById("systemprop");
		const visible = win.style.display !== "none" && win.src.includes("systemprop3.png");
		const allEls = [
			document.getElementById("ms_face"),
			document.getElementById("ms_c1"), document.getElementById("ms_c2"), document.getElementById("ms_c3"),
			document.getElementById("ms_t1"), document.getElementById("ms_t2"), document.getElementById("ms_t3"),
			...advTiles.flat()
		];
		if (!visible) {
			allEls.forEach(el => el.style.display = "none");
			return;
		}
		const rect = win.getBoundingClientRect();
		const scaleX = rect.width  / win.offsetWidth;
		const scaleY = rect.height / win.offsetHeight;
		const winZ = parseInt(win.style.zIndex) || 0;

		function pinEl(el, coord) {
			el.style.display = "block";
			el.style.left   = (rect.left + coord.x * scaleX) + "px";
			el.style.top    = (rect.top  + coord.y * scaleY) + "px";
			el.style.width  = (coord.w * scaleX) + "px";
			el.style.height = (coord.h * scaleY) + "px";
			el.style.zIndex = winZ + 1;
		}

		pinEl(document.getElementById("ms_face"), advFace);
		advCounters.forEach((coord, i) => {
			const ids = ["ms_c1","ms_c2","ms_c3","ms_t1","ms_t2","ms_t3"];
			pinEl(document.getElementById(ids[i]), coord);
		});
		for (let r = 0; r < advRows; r++)
			for (let c = 0; c < advColumns; c++)
				pinEl(advTiles[r][c], { x: advColumnX[c], y: advRowY[r], w: advTileW, h: advTileH });
	}

	window.addEventListener("resize", advPinAll);

	function advGetTile(e) {
		const win = document.getElementById("systemprop");
		const rect = win.getBoundingClientRect();
		const scaleX = rect.width / win.offsetWidth;
		const scaleY = rect.height / win.offsetHeight;
		const lx = (e.clientX - rect.left) / scaleX;
		const ly = (e.clientY - rect.top)  / scaleY;
		for (let r = 0; r < advRows; r++)
			for (let c = 0; c < advColumns; c++) {
				const tx = advColumnX[c], ty = advRowY[r];
				if (lx >= tx && lx < tx + advTileW && ly >= ty && ly < ty + advTileH)
					return { r, c };
			}
		return null;
	}

	function advFaceClick(e) {
		const win = document.getElementById("systemprop");
		const rect = win.getBoundingClientRect();
		const scaleX = rect.width / win.offsetWidth;
		const scaleY = rect.height / win.offsetHeight;
		const lx = (e.clientX - rect.left) / scaleX;
		const ly = (e.clientY - rect.top)  / scaleY;
		return lx >= advFace.x && lx < advFace.x + advFace.w &&
			   ly >= advFace.y && ly < advFace.y + advFace.h;
	}

		}

		dragWin = el;
		offset.x = e.clientX - rect.left;
		offset.y = e.clientY - rect.top;
		e.preventDefault();
	});

	// sticky windows so no butter no slip slide happy!
	document.addEventListener("mousemove", (e) => {
		if (dragWin) {
			dragWin.style.position = "fixed";
			dragWin.style.margin = "0";
			dragWin.style.transformOrigin = "top left";
			dragWin.style.left = (e.clientX - offset.x) + "px";
			dragWin.style.top  = (e.clientY - offset.y) + "px";
			pinButton();
			advPinAll();
		}
		if (advShockArea && !advLose && !advWin) {
			const tile = advGetTile(e);
			advHoldTile = tile || null;
			document.getElementById("ms_face").src = advHoldButtonRaw
				? "window/advanced/face_shock.png"
				: "window/advanced/face_smile.png";
			advTileRender(false);
			advPinAll();
		}
		if (advFacePress) {
			document.getElementById("ms_face").src = advFaceClick(e)
				? "window/advanced/face_press.png"
				: (advWin ? "window/advanced/face_cool.png"
				: advLose ? "window/advanced/face_die.png"
				: "window/advanced/face_smile.png");
		}
	});
	
	// GoodBye
	document.addEventListener("mouseup", (e) => {
		heldWinButton = null;
		advHoldButtonRaw = false;
		if (advShockArea) {
			advShockArea = false;
			advHoldTile = null;
			advHoldButton = 0;
			if (!advLose && !advWin)
				document.getElementById("ms_face").src = "window/advanced/face_smile.png";
			advTileRender(false);
			advPinAll();
		}
		dragWin = null;
	});
</script>
